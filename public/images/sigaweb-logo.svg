<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" width="400" height="130">
  <defs>
    <linearGradient id="lgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="50%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ícono -->
  <rect x="8" y="10" width="100" height="110" rx="18" fill="#0d1526"/>
  <rect x="24" y="82" width="68" height="14" rx="3.5" fill="url(#ag)" opacity="0.6"/>
  <rect x="24" y="62" width="68" height="14" rx="3.5" fill="url(#ag)" opacity="0.45"/>
  <rect x="30" y="43" width="56" height="14" rx="3.5" fill="url(#ig)" filter="url(#sh)"/>

  <!-- Cuernos sutiles -->
  <path d="M30,43 Q22,32 26,22" stroke="#22c55e" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M86,43 Q94,32 90,22" stroke="#22c55e" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Nodos -->
  <circle cx="92" cy="69" r="4.5" fill="#14b8a6" opacity="0.85"/>
  <circle cx="24" cy="89" r="3" fill="#3b82f6" opacity="0.7"/>

  <!-- Texto -->
  <text x="128" y="82"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="52" font-weight="800" letter-spacing="-2"
        fill="white">Siga</text>
  <text x="234" y="82"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="52" font-weight="800" letter-spacing="-2"
        fill="url(#lgrad)">Web</text>
  <text x="128" y="105"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="10" font-weight="600" letter-spacing="3.5"
        fill="#22c55e" opacity="0.8">INFORMACIÓN &amp; GESTIÓN</text>
  <line x1="128" y1="91" x2="345" y2="91"
        stroke="url(#lgrad)" stroke-width="1" opacity="0.15"/>
</svg>
