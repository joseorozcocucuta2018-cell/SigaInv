<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22c55e" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="80" height="80" rx="18" fill="#0d1526"/>

  <!-- Barra inferior -->
  <rect x="14" y="52" width="52" height="10" rx="3" fill="url(#g2)" opacity="0.6"/>

  <!-- Barra media -->
  <rect x="14" y="37" width="52" height="10" rx="3" fill="url(#g2)" opacity="0.45"/>

  <!-- Barra superior -->
  <rect x="20" y="24" width="40" height="10" rx="3" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Cuerno izquierdo -->
  <path d="M20,24 Q14,16 18,10" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Cuerno derecho -->
  <path d="M60,24 Q66,16 62,10" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Nodos -->
  <circle cx="66" cy="41.5" r="4" fill="#14b8a6" opacity="0.85"/>
  <circle cx="14" cy="57" r="3" fill="#3b82f6" opacity="0.7"/>
</svg>
